<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Splendor – Game Over</title>
    <link rel="stylesheet" th:href="@{/css/game.css}" href="/css/game.css">
</head>
<body>
    <div class="container">
        <h1>Game Over</h1>
        <section class="winner-section">
            <h2>Final scores</h2>
            <ul>
                <li th:each="player : ${gameSession.getPlayers()}">
                    Player <span th:text="${player.getPlayerID()}">1</span>
                    <span th:if="${player.isHuman()}">(You)</span>
                    <span th:unless="${player.isHuman()}">(CPU)</span>:
                    <strong th:text="${player.getPrestigePoints()}">0</strong> points
                </li>
            </ul>
            <p class="winner-msg">
                Winner(s):
                <span th:each="p : ${gameSession.getPlayers()}" th:if="${winnerIds.contains(p.getPlayerID())}">
                    Player <span th:text="${p.getPlayerID()}">1</span>
                    <span th:if="${p.isHuman()}">(You)</span>
                    <span th:unless="${p.isHuman()}">(CPU)</span>
                </span>
            </p>
        </section>
        <a href="/" class="link-home">Back to menu</a>
    </div>
</body>
</html>
